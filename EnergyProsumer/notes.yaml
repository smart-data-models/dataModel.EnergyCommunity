notesHeader: >
  Purpose: This data model represents an Energy Prosumer, a role played by an
  individual or organization that both consumes and produces energy
  within an energy community.

notesMiddle: >
  Context: Participants in energy communities often act simultaneously as consumers
  and producers of energy. This role cannot be fully represented using
  generic Person or Organization models alone.

  Scope: This model defines the energy participation role and its relationships
  to energy assets, consumption, and production. It does not model Person
  or Organization entities directly.

  Relationships: represents links the prosumer role to the underlying Person or Organization;
  memberOf links the prosumer to an EnergyCommunity; controls links to energy assets controlled
  by the prosumer; consumes links to energy consumption data associated with the prosumer;
  produces links to energy production data associated with the prosumer.

notesFooter: >
  DesignRationale: Explicit modeling of prosumer roles enables flexible representation across
  different energy community configurations.

  Standards: Fully compliant with NGSI-LD and Smart Data Models guidelines.

  Status: Incubated in Smart Data Models repository.
