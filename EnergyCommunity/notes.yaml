notesHeader: >
  Purpose: This data model represents an Energy Community as a collective entity enabling
  shared energy production, consumption, and storage among multiple participants.

notesMiddle: >
  Context: Energy communities enable collective self-consumption, flexibility services,
  and local energy markets. This model provides a common representation of the
  community, its members, and aggregated energy assets.

  Scope: This model does not define physical energy assets such as photovoltaic systems,
  batteries, electric vehicles, or chargers. These are referenced via NGSI-LD relationships
  to existing Smart Data Models.

  Relationships: hasMember links to EnergyProsumer entities participating in the community;
  aggregates links to energy assets managed at community level; aggregatesConsumption links
  to aggregated community consumption data; aggregatesProduction links to aggregated community
  production data; usesWeatherForecast links to weather forecast entities used for optimization.

notesFooter: >
  Reuse: Designed for reuse across Smart Energy and Smart Cities applications.

  Compatibility: Fully compatible with NGSI-LD and Smart Data Models guidelines.

  Status: Incubated in Smart Data Models repository.
